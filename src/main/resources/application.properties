spring.application.name=Latte and Letters
spring.config.import=optional:file:./scripts/local-dev.properties

spring.datasource.url=${LATTE_AND_LETTERS_DB_URL:jdbc:mysql://127.0.0.1:3306/latte_and_letters?useSSL=false&serverTimezone=Asia/Manila&allowPublicKeyRetrieval=true}
spring.datasource.username=${LATTE_AND_LETTERS_DB_USERNAME:root}
spring.datasource.password=${LATTE_AND_LETTERS_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true
spring.devtools.livereload.enabled=false

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

server.error.whitelabel.enabled=false
server.servlet.session.timeout=30m

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

latteandletters.storage.root=${LATTE_AND_LETTERS_STORAGE_ROOT:${user.dir}/storage}
latteandletters.notification.outbox-root=${LATTE_AND_LETTERS_NOTIFICATION_OUTBOX_ROOT:${latteandletters.storage.root}/email-outbox}
latteandletters.smtp.host=${LATTE_AND_LETTERS_SMTP_HOST:smtp.gmail.com}
latteandletters.smtp.port=${LATTE_AND_LETTERS_SMTP_PORT:587}
latteandletters.smtp.username=${LATTE_AND_LETTERS_SMTP_USERNAME:latteandletters@gmail.com}
latteandletters.smtp.password=${LATTE_AND_LETTERS_SMTP_PASSWORD:}
latteandletters.smtp.from=${LATTE_AND_LETTERS_SMTP_FROM:latteandletters@gmail.com}
latteandletters.smtp.ssl=${LATTE_AND_LETTERS_SMTP_SSL:true}
latteandletters.demo-data.enabled=${LATTE_AND_LETTERS_DEMO_DATA_ENABLED:true}
latteandletters.circulation.daily-fine=${LATTE_AND_LETTERS_CIRCULATION_DAILY_FINE:2.00}
latteandletters.circulation.reserve-daily-fine=${LATTE_AND_LETTERS_CIRCULATION_RESERVE_DAILY_FINE:50.00}
latteandletters.circulation.max-active-loans=${LATTE_AND_LETTERS_CIRCULATION_MAX_ACTIVE_LOANS:5}
latteandletters.circulation.max-loan-days=${LATTE_AND_LETTERS_CIRCULATION_MAX_LOAN_DAYS:7}
latteandletters.circulation.block-on-overdue=${LATTE_AND_LETTERS_CIRCULATION_BLOCK_ON_OVERDUE:true}
latteandletters.circulation.block-on-unpaid-fines=${LATTE_AND_LETTERS_CIRCULATION_BLOCK_ON_UNPAID_FINES:true}
latteandletters.reservations.claim-hours=${LATTE_AND_LETTERS_RESERVATIONS_CLAIM_HOURS:24}
latteandletters.reservations.borrow-request-minutes=${LATTE_AND_LETTERS_RESERVATIONS_BORROW_REQUEST_MINUTES:30}
latteandletters.registration-otp.resend-seconds=${LATTE_AND_LETTERS_REGISTRATION_OTP_RESEND_SECONDS:180}
latteandletters.registration-otp.validity-minutes=${LATTE_AND_LETTERS_REGISTRATION_OTP_VALIDITY_MINUTES:3}
latteandletters.profile-otp.resend-seconds=${LATTE_AND_LETTERS_PROFILE_OTP_RESEND_SECONDS:180}
latteandletters.profile-otp.validity-minutes=${LATTE_AND_LETTERS_PROFILE_OTP_VALIDITY_MINUTES:3}
latteandletters.password-reset-otp.resend-seconds=${LATTE_AND_LETTERS_PASSWORD_RESET_OTP_RESEND_SECONDS:180}
latteandletters.password-reset-otp.validity-minutes=${LATTE_AND_LETTERS_PASSWORD_RESET_OTP_VALIDITY_MINUTES:3}

latteandletters.integration.attendance-base-url=${LATTE_AND_LETTERS_ATTENDANCE_BASE_URL:}
latteandletters.integration.cafe-base-url=${LATTE_AND_LETTERS_CAFE_BASE_URL:}
